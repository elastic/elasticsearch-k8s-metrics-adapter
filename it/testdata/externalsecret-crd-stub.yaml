# Stub CRD so the chart's ExternalSecret object applies inertly in kind.
#
# The Helm chart always renders an external-secrets.io/v1 ExternalSecret, but a
# kind cluster has neither the external-secrets operator nor its CRDs. This
# minimal CRD (schema open via x-kubernetes-preserve-unknown-fields) lets the
# object be created and then sit unreconciled — harmless, since the adapter pod
# does not depend on the secret it would produce (e2e values set envFrom: []).
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: externalsecrets.external-secrets.io
spec:
  group: external-secrets.io
  scope: Namespaced
  names:
    kind: ExternalSecret
    listKind: ExternalSecretList
    plural: externalsecrets
    singular: externalsecret
    shortNames:
      - es
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
