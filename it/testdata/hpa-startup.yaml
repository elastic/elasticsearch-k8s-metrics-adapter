# HPA applied BEFORE the adapter starts, to exercise scenario 1: a metric
# referenced by a pre-existing HPA must be advertised once the adapter's watcher
# completes its initial cache sync. The scaleTargetRef need not exist — the
# adapter only reads spec.metrics.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: startup-advertise
  namespace: default
spec:
  minReplicas: 1
  maxReplicas: 1
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nonexistent
  metrics:
    - type: Pods
      pods:
        metric:
          name: prometheus.proxy_open_connections.value
        target:
          type: AverageValue
          averageValue: "42"
