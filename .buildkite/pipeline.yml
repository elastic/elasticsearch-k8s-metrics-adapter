env:
  VERSION: "${BUILDKITE_COMMIT:0:12}"
  DOCKER_IMAGE: docker.elastic.co/cloud-ci/k8s-arch/elasticsearch-k8s-metrics-adapter
  DOCKER_IMAGE_TAG: git-${VERSION}
  DRIVAH_AMD_AGENT_MEMORY: "6G"

steps:
  - label: ":go: Run unit tests"
    command: "make test"
    key: "tests"
    artifact_paths:
      - "coverage.out"
    agents:
      image: "docker.elastic.co/ci-agent-images/eck-region/go-builder-buildkite-agent:1.26.5"
      cpu: "4"
      memory: "5G"

  - label: ":go: Build"
    command: "make all"
    agents:
      image: "docker.elastic.co/ci-agent-images/eck-region/go-builder-buildkite-agent:1.26.5"
      cpu: "5"
      memory: "8G"

  - label: ":helm: validate helm charts"
    command: "make validate-helm"
    agents:
      image: "docker.elastic.co/ci-agent-images/eck-region/go-builder-buildkite-agent:1.26.5"
      cpu: "4"
      memory: "4G"

  - label: "Package Helm Charts and push into registry"
    command: "make -C /agent helm-publish"
    env:
      OCI_REGISTRY_PATH: oci://${DOCKER_IMAGE}
      CHART_APP_VERSION: "${DOCKER_IMAGE_TAG}"
    agents:
      image: "docker.elastic.co/ci-agent-images/serverless-helm-builder:0.3.8"

  - wait

  - group: ":docker: Build Container Images"
    steps:
      - label: ":docker: :seedling: Trigger Image Creation"
        command: "make -C /agent generate-docker-images"
        env:
          DRIVAH_AMD_AGENT_MEMORY: "8G"
          DRIVAH_AMD_AGENT_CPU: "6"
        agents:
          image: "docker.elastic.co/ci-agent-images/serverless-docker-builder:0.11.0"

  - wait

  - label: ":go: :kubernetes: Run e2e tests (hpa discovery mode)"
    command: |
      trap 'make e2e-down || true' EXIT
      # Go is preinstalled at /usr/local/go on the tooling image; just put it on PATH.
      export PATH=$PATH:/usr/local/go/bin
      # Install kubectl
      curl -sSLo /usr/local/bin/kubectl "https://dl.k8s.io/release/$(curl -sSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
      chmod +x /usr/local/bin/kubectl
      # Install kind
      curl -sSLo /usr/local/bin/kind "https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-amd64"
      chmod +x /usr/local/bin/kind
      # Install helm
      curl -sSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      make e2e-up
      make e2e
    artifact_paths:
      - "e2e-*.log"
    agents:
      provider: gcp
      image: family/tooling-ubuntu-2204
      imageProject: elastic-images-prod
      machineType: n1-highcpu-16

  - wait

  - label: ":serverless::argo: Run synthetics tests and update elasticsearch-k8s-metrics-adapter to ${VERSION} in serverless-gitops"
    branches: main
    trigger: gpctl-promote-after-serverless-devenv-synthetics
    build:
      env:
        SERVICE: elasticsearch-k8s-metrics-adapter
        SERVICE_COMMIT_HASH: "${VERSION}"

notify:
  - slack: "#ecp-services-notifications"
    if: build.branch == "main" && build.state == "failed" && build.source != "trigger_job"
